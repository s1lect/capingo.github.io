<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сторінку не знайдено | Capingo</title>
<link rel="icon" type="image/png" href="favicon.png?v=2.0">
<link rel="shortcut icon" href="favicon.png?v=2.0">
<link rel="apple-touch-icon" href="favicon.png?v=2.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0F9FF;
  --primary: #0891B2;
  --primary-l: #06B6D4;
  --accent: #2563EB;
  --text: #0C1A2E;
  --text2: #334E68;
  --card: rgba(255, 255, 255, 0.74);
  --border: rgba(8, 145, 178, 0.12);
  --shadow: 0 10px 40px -10px rgba(8, 145, 178, 0.10);
  --font-uk: 'Manrope', sans-serif;
  --font-en: 'Playfair Display', serif;
  --r: 24px;
}

[data-theme="dark"] {
  --bg: #070E1A;
  --primary: #22D3EE;
  --accent: #60A5FA;
  --text: #E8F4FD;
  --text2: #8BAECC;
  --card: rgba(13, 27, 46, 0.88);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-uk);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Background image like the site */
.bg-image {
  position: fixed;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2000');
  background-size: cover;
  background-position: center;
  z-index: -2;
  filter: brightness(0.7) saturate(1.2);
}

.bg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.3);
  backdrop-filter: blur(8px);
  z-index: -1;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.container {
  text-align: center;
  padding: 3rem;
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  max-width: 500px;
  width: 90%;
  animation: fadeInUp 0.8s ease both;
}

h1 {
  font-family: var(--font-en);
  font-size: 6rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 1rem;
  font-style: italic;
}

h2 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  color: var(--text);
}

p {
  color: var(--text2);
  margin-bottom: 2.5rem;
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  border-radius: 100px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
  text-decoration: none;
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--primary-l));
  color: #fff;
  box-shadow: 0 8px 24px -6px rgba(8, 145, 178, 0.4);
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px -8px rgba(8, 145, 178, 0.6);
}

.btn::after {
  content: '→';
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #070E1A;
    --primary: #22D3EE;
    --accent: #60A5FA;
    --text: #E8F4FD;
    --text2: #8BAECC;
    --card: rgba(13, 27, 46, 0.88);
  }
}
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  
  <div class="container">
    <h1>404</h1>
    <h2>Упс! Схоже, ця стежка вела не туди.</h2>
    <p>Цієї сторінки більше не існує або вона змінила свою адресу. Але ваша подорож у світ англійської мови продовжується!</p>
    <a href="/" class="btn">Повернутися на головну</a>
  </div>

  <script>
    // Match theme from localStorage if site uses it
    const theme = localStorage.getItem('theme');
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</body>
</html>
